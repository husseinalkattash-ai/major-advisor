<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Major Advisor — University Major Recommender</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="major-advisor.css" />
  <style>
    html, body { background: oklch(0.955 0.008 255); }
  </style>
</head>
<body>
  <div id="ma-root" class="stage" data-direction="a"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- data + copy (plain JS) -->
  <script src="ma-data.js"></script>
  <script src="ma-copy.js"></script>
  <!-- CLIPS-backed scoring: overrides the demo heuristic with the real engine -->
  <script src="ma-clips.js"></script>

  <!-- components (JSX/babel) -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ma-icons.jsx"></script>
  <script type="text/babel" src="ma-components.jsx"></script>
  <script type="text/babel" src="ma-screens.jsx"></script>
  <script type="text/babel" src="ma-app.jsx"></script>

  <script type="text/babel" data-presets="react">
    const mount = () => {
      if (!window.MAApp) { setTimeout(mount, 30); return; }
      const root = ReactDOM.createRoot(document.getElementById("ma-root"));
      root.render(React.createElement(window.MAApp));
    };
    mount();
  </script>
</body>
</html>
